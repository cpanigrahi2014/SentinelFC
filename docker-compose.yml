version: '3.8'

x-common-env: &common-env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: actimize
  POSTGRES_USER: actimize
  POSTGRES_PASSWORD: actimize_secret
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  ELASTICSEARCH_URL: http://elasticsearch:9200
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: neo4j_secret
  REDIS_URL: redis://redis:6379
  JWT_SECRET_KEY: actimize-jwt-secret-change-in-production
  ENCRYPTION_KEY: YWN0aW1pemUtZW5jcnlwdGlvbi1rZXktMzI=

services:
  # ===================== Infrastructure =====================

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: actimize
      POSTGRES_USER: actimize
      POSTGRES_PASSWORD: actimize_secret
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U actimize"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/neo4j_secret
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p neo4j_secret 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===================== Microservices =====================

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "8100:8000"
    environment:
      <<: *common-env
      SERVICE_NAME: api-gateway
      SERVICE_PORT: "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  transaction-monitoring:
    build:
      context: .
      dockerfile: services/transaction-monitoring/Dockerfile
    ports:
      - "8001:8001"
    environment:
      <<: *common-env
      SERVICE_NAME: transaction-monitoring
      SERVICE_PORT: "8001"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  fraud-detection:
    build:
      context: .
      dockerfile: services/fraud-detection/Dockerfile
    ports:
      - "8002:8002"
    environment:
      <<: *common-env
      SERVICE_NAME: fraud-detection
      SERVICE_PORT: "8002"
    depends_on:
      kafka:
        condition: service_healthy

  sanctions-screening:
    build:
      context: .
      dockerfile: services/sanctions-screening/Dockerfile
    ports:
      - "8003:8003"
    environment:
      <<: *common-env
      SERVICE_NAME: sanctions-screening
      SERVICE_PORT: "8003"

  customer-risk-scoring:
    build:
      context: .
      dockerfile: services/customer-risk-scoring/Dockerfile
    ports:
      - "8004:8004"
    environment:
      <<: *common-env
      SERVICE_NAME: customer-risk-scoring
      SERVICE_PORT: "8004"

  alert-management:
    build:
      context: .
      dockerfile: services/alert-management/Dockerfile
    ports:
      - "8005:8005"
    environment:
      <<: *common-env
      SERVICE_NAME: alert-management
      SERVICE_PORT: "8005"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  case-management:
    build:
      context: .
      dockerfile: services/case-management/Dockerfile
    ports:
      - "8006:8006"
    environment:
      <<: *common-env
      SERVICE_NAME: case-management
      SERVICE_PORT: "8006"
    depends_on:
      postgres:
        condition: service_healthy

  network-analytics:
    build:
      context: .
      dockerfile: services/network-analytics/Dockerfile
    ports:
      - "8007:8007"
    environment:
      <<: *common-env
      SERVICE_NAME: network-analytics
      SERVICE_PORT: "8007"
    depends_on:
      neo4j:
        condition: service_healthy

  regulatory-reporting:
    build:
      context: .
      dockerfile: services/regulatory-reporting/Dockerfile
    ports:
      - "8008:8008"
    environment:
      <<: *common-env
      SERVICE_NAME: regulatory-reporting
      SERVICE_PORT: "8008"
    depends_on:
      postgres:
        condition: service_healthy

  ai-ml-scoring:
    build:
      context: .
      dockerfile: services/ai-ml-scoring/Dockerfile
    ports:
      - "8009:8009"
    environment:
      <<: *common-env
      SERVICE_NAME: ai-ml-scoring
      SERVICE_PORT: "8009"

  data-integration:
    build:
      context: .
      dockerfile: services/data-integration/Dockerfile
    ports:
      - "8010:8010"
    environment:
      <<: *common-env
      SERVICE_NAME: data-integration
      SERVICE_PORT: "8010"
    depends_on:
      kafka:
        condition: service_healthy

  audit-logging:
    build:
      context: .
      dockerfile: services/audit-logging/Dockerfile
    ports:
      - "8011:8011"
    environment:
      <<: *common-env
      SERVICE_NAME: audit-logging
      SERVICE_PORT: "8011"
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  # ===================== Frontend =====================

  investigation-dashboard:
    build: ./frontend/investigation-dashboard
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  es_data:
  neo4j_data:
  redis_data:
