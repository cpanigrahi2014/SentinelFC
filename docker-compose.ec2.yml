version: '3.8'

# Production override for EC2 deployment alongside CRM app
# Remaps ports that conflict with existing crm containers
# Usage: docker compose -f docker-compose.yml -f docker-compose.ec2.yml up -d

services:
  postgres:
    ports:
      - "5433:5432"

  zookeeper:
    ports:
      - "2182:2181"

  kafka:
    ports:
      - "9094:9092"
    environment:
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

  elasticsearch:
    ports:
      - "9201:9200"
    environment:
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"

  neo4j:
    ports:
      - "7475:7474"
      - "7688:7687"

  redis:
    ports:
      - "6381:6379"

  api-gateway:
    ports:
      - "8100:8000"

  transaction-monitoring:
    ports:
      - "8101:8001"

  fraud-detection:
    ports:
      - "8102:8002"

  sanctions-screening:
    ports:
      - "8103:8003"

  customer-risk-scoring:
    ports:
      - "8104:8004"

  alert-management:
    ports:
      - "8105:8005"

  case-management:
    ports:
      - "8106:8006"

  network-analytics:
    ports:
      - "8107:8007"

  regulatory-reporting:
    ports:
      - "8108:8008"

  ai-ml-scoring:
    ports:
      - "8109:8009"

  data-integration:
    ports:
      - "8110:8010"

  audit-logging:
    ports:
      - "8111:8011"

  investigation-dashboard:
    ports:
      - "3001:80"
